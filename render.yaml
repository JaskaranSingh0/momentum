# Render Infrastructure as Code
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: momentum
    env: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: |
      npm install
      cd ../client
      npm install
      npm run build
      cd ../server
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: self
      # Placeholder – replace with your actual deployed URL once known:
      - key: GOOGLE_CALLBACK_URL
        value: https://YOUR_SERVICE_NAME.onrender.com/auth/google/callback
      # Secrets to set in dashboard (not committed):
      # MONGO_URI, SESSION_SECRET, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, COOKIE_SECURE (true/false), COOKIE_SAMESITE (optional)
